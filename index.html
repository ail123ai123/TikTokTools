<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تيك توك</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #fe2c55; }
        input { width: 90%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { background-color: #fe2c55; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تحميل تيك توك</h1>
        <input type="text" id="videoLink" placeholder="الصق رابط الفيديو هنا...">
        <button class="btn" onclick="go()">بدء التحميل</button>
    </div>

    <script>
        function go() {
            const link = document.getElementById('videoLink').value;
            if (link.trim() !== "") {
                localStorage.setItem('v_url', link); // حفظ الرابط ببساطة
                window.location.href = 'download.html';
            } else {
                alert("ضع الرابط أولاً!");
            }
        }
    </script>
</body>
</html>
