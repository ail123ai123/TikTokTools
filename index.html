<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل فيديوهات تيك توك</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #fe2c55; }
        input { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
        .btn { background-color: #fe2c55; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #ef2950; }
    </style>
</head>
<body>

<div class="container">
    <h1>محمل تيك توك السريع</h1>
    <p>ضع رابط الفيديو هنا للتحميل</p>
    
    <input type="text" id="videoLink" placeholder="https://www.tiktok.com/@user/video/...">
    <br>
    <button class="btn" onclick="startProcess()">بدء التحميل</button>
</div>

<script>
    function startProcess() {
        const link = document.getElementById('videoLink').value;
        if (link.trim() === "") {
            alert("يرجى وضع رابط فيديو صحيح");
            return;
        }
        // تخزين الرابط في ذاكرة المتصفح لينتقل للصفحة الثانية
        localStorage.setItem('videoUrl', link);
        // الانتقال لصفحة التحميل
        window.location.href = 'download.html';
    }
</script>

</body>
</html>
