<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Tools - تحميل سريع</title>
    <style>
        body { background-color: #010101; color: white; font-family: 'Arial', sans-serif; text-align: center; padding: 50px 20px; }
        .logo { color: #fe2c55; font-size: 40px; font-weight: bold; margin-bottom: 30px; }
        input { width: 90%; max-width: 500px; padding: 15px; border-radius: 25px; border: 2px solid #fe2c55; background: #121212; color: white; font-size: 16px; outline: none; }
        button { background-color: #fe2c55; color: white; border: none; padding: 15px 40px; border-radius: 25px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="logo">TikTok Tools</div>
    <h2>حمل فيديوهات تيك توك بدون علامة مائية</h2>
    <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا...">
    <br>
    <button onclick="goToDownload()">تحميل الآن</button>
    <script>
        function goToDownload() {
            let url = document.getElementById('videoUrl').value;
            if(url.includes('tiktok.com')) {
                window.location.href = "download.html?url=" + encodeURIComponent(url);
            } else { alert("يرجى وضع رابط تيك توك صحيح"); }
        }
    </script>
</body>
</html>
