<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل فيديوهات تيك توك</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #fe2c55; font-size: 28px; }
        input { width: 90%; padding: 15px; margin: 25px 0; border: 2px solid #fe2c55; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { background-color: #fe2c55; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #e0264d; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>تيك توك داونلودر</h1>
    <p>أدخل رابط الفيديو لبدء التحميل السريع</p>
    
    <input type="text" id="videoLink" placeholder="الصق رابط تيك توك هنا...">
    <br>
    <button class="btn" onclick="startProcess()">تحميل الآن</button>
</div>

<script>
    function startProcess() {
        const link = document.getElementById('videoLink').value;
        if (link.trim() === "" || !link.includes("tiktok.com")) {
            alert("يرجى إدخال رابط تيك توك صحيح");
            return;
        }
        localStorage.setItem('videoUrl', link);
        window.location.href = 'download.html';
    }
</script>

</body>
</html>
