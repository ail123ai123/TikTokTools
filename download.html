<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');
    const downloadBtn = document.getElementById('downloadBtn');

    // جلب الرابط من الذاكرة
    let rawUrl = localStorage.getItem('videoUrl');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none';

            if (rawUrl) {
                downloadBtn.style.display = 'block';
                downloadBtn.innerText = "تحميل الفيديو الآن";
                
                // هذه الوظيفة تمنع التوجيه للتطبيق وتفتح موقع التحميل مباشرة
                downloadBtn.onclick = function(e) {
                    e.preventDefault(); 
                    // تحويل الرابط لخدمة التحميل مباشرة
                    const downloadService = "https://snaptik.app/abc?url=" + encodeURIComponent(rawUrl);
                    window.open(downloadService, '_blank'); 
                };
            } else {
                downloadBtn.innerText = "خطأ: ارجع وضع الرابط";
                downloadBtn.href = "index.html";
                downloadBtn.style.display = 'block';
                downloadBtn.style.backgroundColor = "#666";
            }
        }
    }, 1000);
</script>
