<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تجهيز الرابط - تيك توك</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #fe2c55; }
        .timer { font-size: 24px; font-weight: bold; color: #333; margin: 20px 0; }
        .btn { display: none; background-color: #fe2c55; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-size: 18px; font-weight: bold; }
        .ad-space { margin: 20px 0; min-height: 250px; background: #fafafa; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>جاري فحص الرابط...</h1>
    <p>يرجى الانتظار قليلاً، سيظهر زر التحميل بعد انتهاء العد.</p>

    <div class="ad-space">
        <script async="async" data-cfasync="false" src="https://pl29272676.profitablecpmratenetwork.com/ae02281ed679eccd447fa026ddbe0ffb/invoke.js"></script>
        <div id="container-ae02281ed679eccd447fa026ddbe0ffb"></div>
    </div>

    <div class="timer" id="timer">15</div>
    
    <a href="#" id="downloadBtn" class="btn">اضغط هنا للتحميل الآن</a>

    <p style="margin-top: 20px; color: #666; font-size: 12px;">تأكد من تحديث الصفحة إذا لم يظهر الزر.</p>
</div>

<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');
    const downloadBtn = document.getElementById('downloadBtn');

    // استرجاع رابط الفيديو من الذاكرة
    const videoUrl = localStorage.getItem('videoUrl');
    if (videoUrl) {
        downloadBtn.href = videoUrl;
    } else {
        downloadBtn.href = 'index.html';
        downloadBtn.innerText = 'رجوع للملف الرئيسي';
    }

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none';
            downloadBtn.style.display = 'inline-block';
        }
    }, 1000);
</script>

</body>
</html>
