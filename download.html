<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحضير الفيديو...</title>
    <style>
        body { background-color: #010101; color: white; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; }
        .ad-box { width: 300px; height: 250px; background: #1a1a1a; border: 1px dashed #555; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: #888; }
        #countdown { font-size: 60px; color: #fe2c55; font-weight: bold; }
        .btn-ready { display: none; background-color: #25d366; color: white; padding: 15px 40px; border-radius: 25px; text-decoration: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ad-box">مكان الإعلان 1 (أرباحك هنا)</div>
    
    <div id="status">
        <h3>جاري تجهيز رابط التحميل الحقيقي...</h3>
        <div id="countdown">30</div>
    </div>

    <div class="ad-box">مكان الإعلان 2 (أرباحك هنا)</div>

    <a href="#" id="finalBtn" class="btn-ready">اضغط هنا للتحميل النهائي</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        let timeLeft = 30;

        let interval = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                document.getElementById('status').innerHTML = "<h3>الفيديو جاهز الآن!</h3>";
                const btn = document.getElementById('finalBtn');
                btn.style.display = "inline-block";
                // الربط بمحرك تحميل خارجي لضمان جلب الفيديو بدون علامة مائية
                btn.href = "https://snaptik.app/abc?url=" + encodeURIComponent(videoUrl);
            }
        }, 1000);
    </script>
</body>
</html>
