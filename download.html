<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري معالجة الفيديو...</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .timer { font-size: 60px; color: #fe2c55; margin: 20px; font-weight: bold; }
        .ad-space { width: 300px; height: 250px; background: #222; margin: 20px auto; border: 1px dashed #444; line-height: 250px; color: #666; }
        .btn-ready { display: none; background: #25f4ee; color: #000; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>جاري تحسين جودة الفيديو...</h2>
    <p>يرجى الانتظار حتى اكتمال المعالجة لتجنب الأخطاء</p>
    <div class="ad-space">إعلان (مكان الأرباح)</div>
    <div id="countdown" class="timer">--</div>
    <div class="ad-space">إعلان آخر</div>
    <button onclick="alert('تم التحميل!')" id="finalBtn" class="btn-ready">اضغط هنا للتحميل النهائي</button>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let timeLeft = parseInt(urlParams.get('time')) || 30;
        const timerDisplay = document.getElementById("countdown");
        const downloadBtn = document.getElementById("finalBtn");
        let downloadTimer = setInterval(function(){
            if(timeLeft <= 0){
                clearInterval(downloadTimer);
                timerDisplay.style.display = "none";
                downloadBtn.style.display = "inline-block";
            } else {
                timerDisplay.innerHTML = timeLeft;
            }
            timeLeft -= 1;
        }, 1000);
    </script>
</body>
</html>
