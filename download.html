<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحضير التحميل...</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 22px; }
        .timer { font-size: 40px; font-weight: bold; color: #fe2c55; margin: 20px 0; }
        .btn { display: none; background-color: #25d366; color: white; padding: 18px 30px; text-decoration: none; border-radius: 12px; font-size: 20px; font-weight: bold; width: 100%; box-sizing: border-box; }
        .ad-space { margin: 20px 0; min-height: 250px; background: #fff; border-radius: 10px; overflow: hidden; }
        .instructions { font-size: 14px; color: #666; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>جاري تجهيز ملف التحميل...</h1>
    
    <div class="ad-space">
        <script async="async" data-cfasync="false" src="https://pl29272676.profitablecpmratenetwork.com/ae02281ed679eccd447fa026ddbe0ffb/invoke.js"></script>
        <div id="container-ae02281ed679eccd447fa026ddbe0ffb"></div>
    </div>

    <div class="timer" id="timer">15</div>
    
    <a href="#" id="downloadBtn" class="btn">اضغط هنا لبدء التنزيل المباشر</a>
    
    <p class="instructions" id="instructions">إذا لم يبدأ التحميل تلقائياً، اضغط مطولاً على الزر واختر "تنزيل الرابط".</p>
</div>

<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');
    const downloadBtn = document.getElementById('downloadBtn');
    const instructions = document.getElementById('instructions');

    const rawUrl = localStorage.getItem('videoUrl');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none';

            if (rawUrl) {
                // استخدام وسيط لإجبار التحميل (SSSTik API style)
                const downloadLink = "https://www.ssstik.io/abc?url=" + encodeURIComponent(rawUrl);
                downloadBtn.href = downloadLink;
                downloadBtn.style.display = 'block';
                instructions.style.display = 'block';
            } else {
                downloadBtn.innerText = "خطأ: ارجع وضع الرابط";
                downloadBtn.href = "index.html";
                downloadBtn.style.display = 'block';
                downloadBtn.style.backgroundColor = "#666";
            }
        }
    }, 1000);
</script>

</body>
</html>
