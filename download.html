<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');
    const downloadBtn = document.getElementById('downloadBtn');
    const instructions = document.getElementById('instructions');

    const rawUrl = localStorage.getItem('videoUrl');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none';

            if (rawUrl) {
                // هذا الرابط الوسيط يمنع فتح تطبيق تيك توك ويحولك لصفحة التحميل مباشرة
                const finalDownloadLink = "https://snaptik.app/abc?url=" + encodeURIComponent(rawUrl);
                
                downloadBtn.href = finalDownloadLink;
                downloadBtn.style.display = 'block';
                downloadBtn.innerText = "جاهز! اضغط للتحميل الآن";
                instructions.style.display = 'block';
            } else {
                downloadBtn.innerText = "خطأ: ارجع وضع الرابط";
                downloadBtn.href = "index.html";
                downloadBtn.style.display = 'block';
                downloadBtn.style.backgroundColor = "#666";
            }
        }
    }, 1000);
</script>
